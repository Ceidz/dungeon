function genDungeon(region){
  const d=DUNGEON_DATA[region]; if(!d) return null;
  const rooms=[];
  for(let i=0;i<d.rooms;i++){
    if(i===d.rooms-1) rooms.push({type:"boss",done:false,id:uid()});
    else if(i===Math.floor(d.rooms/2)-1) rooms.push({type:"treasure",done:false,id:uid()});
    else if(i===d.rooms-2) rooms.push({type:"rest",done:false,id:uid()});
    else rooms.push({type:"combat",done:false,id:uid()});
  }
  return {name:d.name,region,rooms,roomIdx:0,reward:d.reward,boss:d.boss};
}

  const learnSkill=(name)=>{

  const upgradeItem=(itemName)=>{
    if(!me)return;
    const path=UPGRADE_PATHS[itemName];if(!path){notify("Not upgradeable!","#5a4030");return;}
    const inv=[...me.inventory];
    if(!inv.includes(itemName)){notify("Not in inventory!","#ff5533");return;}
    if(!inv.includes(path.req)){notify("Need: "+path.req,"#ff5533");return;}
    if(me.gold<path.cost){notify("Need more gold!","#ff5533");return;}
    inv.splice(inv.indexOf(itemName),1);inv.splice(inv.indexOf(path.req),1);
    let equipped=[...(me.equipped||[])];let adj={};
    if(equipped.includes(itemName)){
      const old=ITEMS[itemName]||{};
      if(old.effect==="atk")adj.atk=-old.value;if(old.effect==="mag")adj.mag=-old.value;
      if(old.effect==="spd")adj.spd=-old.value;if(old.effect==="hp")adj.maxHp=-old.value;
      equipped=equipped.filter(e=>e!==itemName);
      const nw=ITEMS[path.to]||{};
      if(nw.effect==="atk")adj.atk=(adj.atk||0)+nw.value;if(nw.effect==="mag")adj.mag=(adj.mag||0)+nw.value;
      if(nw.effect==="spd")adj.spd=(adj.spd||0)+nw.value;if(nw.effect==="hp")adj.maxHp=(adj.maxHp||0)+nw.value;
      equipped.push(path.to);
    }
    inv.push(path.to);
    const nm=(me.maxHp)+(adj.maxHp||0);
    setMe(prev=>prev?{...prev,inventory:inv,equipped,gold:prev.gold-path.cost,atk:prev.atk+(adj.atk||0),mag:prev.mag+(adj.mag||0),spd:prev.spd+(adj.spd||0),maxHp:nm,hp:Math.min(prev.hp,nm)}:prev);

  const equipItem=(itemName)=>{

      const eq=[...(prev.equipped||[])];const xi=eq.findIndex(e=>(ITEMS[e]||{}).type===item.type);let p={...prev};

  const useItem=(itemName)=>{

    }

  const castSpell=useCallback((spellId)=>{
    if(!encounter||combatTurn!=="player"||!me)return;
    const clsSpells=SPELLS[me.cls]||[];
    const spell=clsSpells.find(s=>s.id===spellId);if(!spell)return;
    if(me.mana<spell.cost){gLog("Not enough mana!","warn");return;}
    const magPct=1+(learnedSkills["Spell Mastery"]||0)*0.25;
    const wm=(WEATHER_EFFECTS[weather]||WEATHER_EFFECTS.clear).playerDmgMult;
    const tidx=Math.min(selectedTargetIdx,encounter.enemies.length-1);
    setMe(prev=>prev?{...prev,mana:Math.max(0,prev.mana-spell.cost)}:prev);
    if(spell.multi){
      // Hit all enemies
      const dmg=Math.round(rnd(...spell.dmg)*magPct*wm);
      gLog(`${spell.icon} ${spell.name}! ${dmg} dmg × ${encounter.enemies.length} enemies`,\"combat\");
      let updEnemies=encounter.enemies.map(e=>{
        const hp=Math.max(0,e.hp-dmg);
        let upd={...e,hp};
        if(spell.freeze&&Math.random()<0.5)upd={...upd,frozen:true,frozenTurns:1};
        if(spell.id==="plague")upd={...upd,poisoned:true,poisonTurns:4};
        return upd;
      });
      const killed=updEnemies.filter(e=>e.hp<=0);
      const alive=updEnemies.filter(e=>e.hp>0);
      killed.forEach(k=>{gLog(k.name+" defeated!","system");resolveKill(k);});
      if(spell.drain>0){const total=killed.reduce((s,k)=>s+dmg,0)*spell.drain;setMe(prev=>prev?{...prev,hp:Math.min(prev.maxHp,prev.hp+Math.round(total))}:prev);}
      if(alive.length===0){handleCombatWin();}
      else{setEncounter(prev=>({...prev,enemies:alive}));setCombatTurn("enemy");setSelectedTargetIdx(0);setTimeout(()=>enemyTurnFnRef.current&&enemyTurnFnRef.current(alive[0]),900);}
    } else {

      const dmg=Math.round(rnd(...spell.dmg)*magPct*wm);
      let msg=`${spell.icon} ${spell.name}! ${dmg} dmg on ${enemy.name}`;
      if(spell.drain>0){const healed=Math.round(dmg*spell.drain);setMe(prev=>prev?{...prev,hp:Math.min(prev.maxHp,prev.hp+healed)}:prev);msg+=` (+${healed} HP drained)`;}
      gLog(msg,"combat");
      let updEnemy={...enemy,hp:Math.max(0,enemy.hp-dmg)};
      if(spell.freeze&&Math.random()<0.6)updEnemy={...updEnemy,frozen:true,frozenTurns:1};
      if(spell.id==="plague")updEnemy={...updEnemy,poisoned:true,poisonTurns:4};
      // Advance combo
      setComboCount(c=>Math.min(c+1,4));
      if(updEnemy.hp<=0){
        gLog(enemy.name+" defeated!","system");resolveKill(enemy);
        const rem=encounter.enemies.filter((_,i)=>i!==tidx);
        if(rem.length>0){setEncounter(prev=>({...prev,enemies:rem}));setCombatTurn("enemy");setSelectedTargetIdx(0);setTimeout(()=>enemyTurnFnRef.current&&enemyTurnFnRef.current(rem[0]),900);}
        else handleCombatWin();
      } else {
        setEncounter(prev=>({...prev,enemies:prev.enemies.map((e,i)=>i===tidx?updEnemy:e)}));
        setCombatTurn("enemy");setTimeout(()=>enemyTurnFnRef.current&&enemyTurnFnRef.current(updEnemy),900);
      }
    }
    setSpellCastOpen(false);
  },[encounter,combatTurn,me,learnedSkills,weather,selectedTargetIdx,resolveKill,handleCombatWin,gLog]);

  const rest=()=>{
    if(resting||gameView==="combat"||!me)return;setResting(true);gLog("Resting...","story");
    setTimeout(()=>{setMe(prev=>prev?{...prev,mana:prev.maxMana,hp:Math.min(prev.maxHp,prev.hp+Math.round(prev.maxHp*0.1))}:prev);setPoisoned(false);setResting(false);gLog("Rested! Mana restored.","system");notify("Rested!","#55cc66");},1800);
  };

  const enterDungeon=()=>{

    gLog("Entered dungeon: "+d.name,"system");notify("Dungeon: "+d.name,"#e8aa44");
  };

  const enterDungeonRoom=(room)=>{
    const d=dungeonRef.current;if(!d||!room)return;

      } else {
        mobName=reg.mobs[rnd(0,reg.mobs.length-1)];mobTemplate=MOB_TEMPLATES[mobName]||MOB_TEMPLATES["Goblin"];
      }
      const em=isNight?1.2:1.0;
      const mob={...mobTemplate,name:mobName,hp:Math.round(mobTemplate.hp*em),maxHp:Math.round(mobTemplate.hp*em),atk:Math.round(mobTemplate.atk*em)};
      setEncounter({enemies:[mob]});setGameView("combat");setCombatTurn("player");setSelectedTargetIdx(0);

    } else if(room.type==="treasure"){
      const gold=rnd(d.reward*0.1,d.reward*0.25);gainGold(gold);
      if(rnd(1,2)===1){const k=Object.keys(ITEMS);const it=k[rnd(0,k.length-1)];setMe(p=>p?{...p,inventory:[...p.inventory,it]}:p);gLog("Treasure room! +"+gold+"g + "+it,"gold");}

      else{const upd={...d,rooms:d.rooms.map((r,i)=>i===d.roomIdx?{...r,done:true}:r),roomIdx:nextIdx};setDungeon(upd);dungeonRef.current=upd;}
    } else if(room.type==="rest"){
      setMe(prev=>prev?{...prev,hp:Math.min(prev.maxHp,prev.hp+Math.round(prev.maxHp*0.3)),mana:prev.maxMana}:prev);

      else{const upd={...d,rooms:d.rooms.map((r,i)=>i===d.roomIdx?{...r,done:true}:r),roomIdx:nextIdx};setDungeon(upd);dungeonRef.current=upd;}
    }
  };

  const handleCombatWin=useCallback(()=>{
    setEncounter(null);setCombatTurn("player");setShielded(false);setPoisoned(false);setStunned(false);
    setSelectedTargetIdx(0);setRageTurns(0);setHasteBonus(0);setCombatItemOpen(false);
    const d=dungeonRef.current;
    if(d){
      const nextIdx=d.roomIdx+1;
      if(nextIdx>=d.rooms.length){
        setDungeon(null);dungeonRef.current=null;setGameView("world");gainGold(d.reward);
        setMe(prev=>{if(!prev)return prev;const next={...prev,dungeonsCleared:(prev.dungeonsCleared||0)+1};setTimeout(()=>checkAch(next),100);return next;});
        setDungeonComplete({name:d.name,reward:d.reward});advanceQuest(11);

  },[gainGold,checkAch,advanceQuest]);

  const resolveKill=useCallback((killedEnemy)=>{
    gainXP(killedEnemy.xp);gainGold(killedEnemy.gold);
    if(learnedSkills["Regeneration"]){setMe(prev=>prev?{...prev,hp:Math.min(prev.maxHp,prev.hp+10)}:prev);setTimeout(()=>gLog("Regen +10 HP","system"),0);}
    if(rnd(1,4)===1){const keys=Object.keys(ITEMS);const it=keys[rnd(0,keys.length-1)];setMe(prev=>prev?{...prev,inventory:[...prev.inventory,it]}:prev);setTimeout(()=>gLog("Drop: "+it,"gold"),0);}
    setQuests(prev=>prev.map(q=>{
      if(q.id===1&&!q.done){setTimeout(()=>gLog("Quest: First Steps","system"),0);return{...q,done:true};}
      if(q.id===2&&killedEnemy.name==="Goblin"&&!q.done){const p=(q.progress||0)+1;if(p>=q.goal){setTimeout(()=>gLog("Quest: Goblin Slayer","system"),0);gainGold(q.reward);return{...q,done:true,progress:p};}return{...q,progress:p};}
      if(q.id===6&&!q.done&&(killedEnemy.name==="Drake"||killedEnemy.name==="Ancient Dragon")){setTimeout(()=>{gLog("Quest: Dragon Slayer","system");gainGold(q.reward);},0);setAchievements(prev=>prev.includes("dragon")?prev:[...prev,"dragon"]);return{...q,done:true};}
      if(q.id===8&&!q.done&&isNight){const p=(q.progress||0)+1;if(p>=q.goal){setTimeout(()=>gLog("Quest: Night Fighter","system"),0);gainGold(q.reward);return{...q,done:true,progress:p};}return{...q,progress:p};}
      return q;
    }));
    setMe(prev=>{if(!prev)return prev;const next={...prev,kills:prev.kills+1};setTimeout(()=>checkAch(next),100);return next;});
    setGmBounties(prev=>prev.map(b=>{if(b.done||b.type!=="kills")return b;const p=(b.progress||0)+1;if(p>=b.goal){setTimeout(()=>{gLog("Bounty: "+b.name,"system");notify("Bounty: "+b.name,"#ffd700");},0);return{...b,done:true,progress:p};}return{...b,progress:p};}));
  },[gainXP,gainGold,learnedSkills,isNight,gLog,checkAch,notify]);

  const enemyTurnFnRef=useRef(null);
  const enemyTurnFn=useCallback((enemy)=>{
    setEncounter(prev=>{
      if(!prev)return prev;
      const eidx=prev.enemies.findIndex(e=>e===enemy||e.name===enemy.name);
      const targetIdx=eidx>=0?eidx:0;
      let e={...prev.enemies[targetIdx]};let pdmg=0;
      if(e.poisoned&&e.poisonTurns>0){pdmg=20;e.poisonTurns--;if(e.poisonTurns<=0)e.poisoned=false;setTimeout(()=>gLog(e.name+" poison -20","combat"),0);}
      if(e.blinded&&e.blindTurns>0){e.blindTurns--;if(e.blindTurns<=0){e.blinded=false;}}
      if(e.weakened&&e.weakenTurns>0){e.weakenTurns--;if(e.weakenTurns<=0)e.weakened=false;}
      if(e.frozen&&e.frozenTurns>0){e.frozenTurns--;if(e.frozenTurns<=0)e.frozen=false;}
      if(pdmg>0){const hp=Math.max(0,e.hp-pdmg);e.hp=hp;if(hp<=0){setTimeout(()=>{resolveKill(e);const rem=prev.enemies.filter((_,i)=>i!==targetIdx);if(rem.length>0){setEncounter(p=>p?{...p,enemies:rem}:p);setCombatTurn("player");setSelectedTargetIdx(0);}else handleCombatWin();},0);return{...prev,enemies:prev.enemies.map((x,i)=>i===targetIdx?e:x)};}}
      if(e.frozen){setTimeout(()=>{gLog(e.name+" FROZEN - skips turn","combat");setCombatTurn("player");},150);return{...prev,enemies:prev.enemies.map((x,i)=>i===targetIdx?e:x)};}
      return{...prev,enemies:prev.enemies.map((x,i)=>i===targetIdx?e:x)};
    });
    setTimeout(()=>{
      // Guard: if encounter was already resolved (e.g. enemy died from poison), don't apply enemy attack
      if(!encounterRef.current)return;
      setMe(prev=>{
        if(!prev)return prev;
        const ec=activeEvents.includes("eclipse");
        let dmg=rnd(Math.round(enemy.atk*0.8),Math.round(enemy.atk*1.2));
        if(ec)dmg=Math.round(dmg*1.3);if(isNight)dmg=Math.round(dmg*1.2);if(enemy.weakened)dmg=Math.round(dmg*0.7);
        dmg=Math.round(dmg*(WEATHER_EFFECTS[weather]||WEATHER_EFFECTS.clear).enemyDmgMult);
        const dodge=Math.min(0.50,(prev.spd+hasteBonus)/500+(WEATHER_EFFECTS[weather]||WEATHER_EFFECTS.clear).dodgeBonus+(enemy.blinded?0.25:0));
        if(Math.random()<dodge){setTimeout(()=>gLog("Dodged! ("+Math.round(dodge*100)+"%)","combat"),0);setCombatTurn("player");return prev;}
        if((learnedSkills["Mana Shield"]||0)>0&&Math.random()<0.15){setTimeout(()=>gLog("Mana Shield negated hit!","combat"),0);setCombatTurn("player");return prev;}
        if(shielded){setTimeout(()=>gLog("Shield blocked "+enemy.name+"!","combat"),0);setShielded(false);setCombatTurn("player");setQuests(qs=>qs.map(q=>{if(q.id===10&&!q.done&&prev.cls==="Paladin"){const p=(q.progress||0)+1;if(p>=q.goal){setTimeout(()=>gLog("Quest: Holy Warrior","system"),0);return{...q,done:true,progress:p};}return{...q,progress:p};}return q;}));return prev;}
        let newHp=Math.max(0,prev.hp-dmg);
        setComboCount(0); // reset combo on taking damage
        if(poisoned){newHp=Math.max(0,newHp-20);setTimeout(()=>gLog("Poison -20 HP","warn"),0);}
        if(!poisoned&&enemy.poisonChance&&Math.random()<enemy.poisonChance){setPoisoned(true);setTimeout(()=>gLog(enemy.name+" poisons you!","warn"),0);}
        if(party&&Math.random()<0.1){const sd=rnd(5,Math.round(enemy.atk*0.3));setParty(p=>p?{...p,hp:Math.max(0,p.hp-sd)}:p);}
        setTimeout(()=>gLog(enemy.name+" hits for "+dmg+(ec?" (Eclipse!)":isNight?" night":"")+(enemy.weakened?" (weak)":""),"combat"),0);
        if(newHp<=0){const gl=Math.min(50,prev.gold);setTimeout(()=>{setDeathScreen({killer:enemy.name,kills:prev.kills,level:prev.level,region,goldLost:gl});handleCombatWin();setRegion("Starter Isle");setDungeon(null);dungeonRef.current=null;},0);return{...prev,hp:Math.round(prev.maxHp*0.5),gold:Math.max(0,prev.gold-gl)};}
        setCombatTurn("player");return{...prev,hp:newHp};
      });
    },150);
  },[activeEvents,weather,isNight,shielded,poisoned,learnedSkills,hasteBonus,party,region,handleCombatWin,resolveKill,gLog]);

  useEffect(()=>{enemyTurnFnRef.current=enemyTurnFn;},[enemyTurnFn]);

  const playerAttack=(type)=>{
    if(!encounter||combatTurn!=="player"||!me)return;
    const tidx=Math.min(selectedTargetIdx,encounter.enemies.length-1);
    const enemy=encounter.enemies[tidx];if(!enemy||enemy.hp<=0)return;
    const cls=CLASSES[me.cls];
    const atkPct=1+(learnedSkills["Power Strike"]||0)*0.20;
    const magPct=1+(learnedSkills["Spell Mastery"]||0)*0.25;
    const critCh=(learnedSkills["Lucky Strike"]||0)*0.20;
    const wm=(WEATHER_EFFECTS[weather]||WEATHER_EFFECTS.clear).playerDmgMult;
    const rage=rageTurns>0?1.5:1.0;
    let dmg=0,msg="",newMana=me.mana;

    if(type==="attack"){
      dmg=Math.round(rnd(Math.round(me.atk*0.85),Math.round(me.atk*1.15))*atkPct*wm*rage*comboMult);
      const comboLabel=comboCount>=4?"💥 MAX COMBO!":comboCount>=3?"🔥 COMBO x"+(comboCount+1)+"!":comboCount>=2?"⚡ COMBO x"+(comboCount+1):comboCount>=1?"COMBO x"+(comboCount+1):"";
      if(Math.random()<critCh){dmg=Math.round(dmg*2);msg="CRITICAL! "+dmg+" dmg on "+enemy.name+(comboLabel?" "+comboLabel:"");}
      else msg="You hit "+enemy.name+" for "+dmg+(rage>1?" RAGE":"")+(comboLabel?" "+comboLabel:"");
      if(rageTurns>0)setRageTurns(r=>r-1);
      setComboCount(c=>Math.min(c+1,4)); // build combo
    } else if(type==="ability"){
      if(me.mana<cls.abilityCost){gLog("Not enough mana!","warn");return;}
      newMana=me.mana-cls.abilityCost;
      if(me.cls==="Warrior"){dmg=Math.round(me.atk*0.8*atkPct*wm);setStunned(true);msg="Shield Bash! "+enemy.name+" STUNNED! "+dmg+" dmg";advanceQuest(10);}
      else if(me.cls==="Mage"){dmg=Math.round(rnd(80,110)*magPct*wm);msg="Fireball! "+dmg+" magic dmg";advanceQuest(10,dmg);}
      else if(me.cls==="Rogue"){dmg=Math.round(me.atk*2.5*atkPct*wm);msg="BACKSTAB "+enemy.name+"! "+dmg+" dmg";advanceQuest(10);}
      else if(me.cls==="Paladin"){setShielded(true);const heal=Math.round(me.mag*0.5);dmg=Math.round(me.atk*0.5*atkPct*wm);setMe(prev=>prev?{...prev,hp:Math.min(prev.maxHp,prev.hp+heal),mana:newMana}:prev);msg="Holy Shield! +"+heal+" HP. "+dmg+" dmg.";}
      else if(me.cls==="Ranger"){
        const vd=Math.round(me.atk*1.3*atkPct*wm);
        const ne=encounter.enemies.map(e=>({...e,hp:Math.max(0,e.hp-vd)}));
        const killed=ne.filter(e=>e.hp<=0);const surv=ne.filter(e=>e.hp>0);
        gLog("Volley! "+encounter.enemies.length+" targets x"+vd,"combat");
        killed.forEach(k=>{gLog(k.name+" defeated!","system");resolveKill(k);});
        if(encounter.enemies.length>=2)advanceQuest(10);
        let fs=surv;
        if(party&&party.hp>0&&surv.length>0){const ad=rnd(Math.round(party.atk*0.6),party.atk);fs=surv.map((e,i)=>i===0?{...e,hp:Math.max(0,e.hp-ad)}:e);const ak=fs.filter(e=>e.hp<=0);fs=fs.filter(e=>e.hp>0);ak.forEach(k=>{resolveKill(k);});}
        setMe(prev=>prev?{...prev,mana:Math.min(prev.maxMana,newMana+5)}:prev);
        if(fs.length===0)handleCombatWin();
        else{setEncounter(prev=>({...prev,enemies:fs}));setCombatTurn("enemy");setSelectedTargetIdx(0);setTimeout(()=>enemyTurnFnRef.current&&enemyTurnFnRef.current(fs[0]),900);}
        return;
      } else if(me.cls==="Necromancer"){dmg=Math.round((40+me.mag*0.4)*magPct*wm);const drain=Math.round(dmg*0.7);setMe(prev=>prev?{...prev,hp:Math.min(prev.maxHp,prev.hp+drain)}:prev);msg="Death Drain! Stole "+drain+" HP ("+dmg+" dealt)";advanceQuest(10,drain);}
    } else if(type==="flee"){
      setComboCount(0);
      if(rnd(1,2)===1){gLog("You fled!","warn");handleCombatWin();}
      else{gLog("Couldn't escape!","warn");setCombatTurn("enemy");setTimeout(()=>enemyTurnFnRef.current&&enemyTurnFnRef.current(encounter.enemies[0]),800);}
      return;
    }

    setMe(prev=>prev?{...prev,mana:Math.min(prev.maxMana,newMana+5)}:prev);
    let finalHp=Math.max(0,enemy.hp-dmg);
    if(msg)gLog(msg,"combat");
    let allyDmg=0;
    if(party&&party.hp>0&&finalHp>0){allyDmg=rnd(Math.round(party.atk*0.6),party.atk);gLog(party.name+" hits "+enemy.name+" for "+allyDmg,"combat");}
    finalHp=Math.max(0,finalHp-allyDmg);

    if(finalHp<=0){
      gLog(enemy.name+" defeated!","system");resolveKill(enemy);
      const rem=encounter.enemies.filter((_,i)=>i!==tidx);
      if(rem.length>0){gLog(rem[0].name+" advances!","combat");setEncounter(prev=>({...prev,enemies:rem}));setCombatTurn("enemy");setSelectedTargetIdx(0);setTimeout(()=>enemyTurnFnRef.current&&enemyTurnFnRef.current(rem[0]),900);}
      else handleCombatWin();
    } else {
      const upd=encounter.enemies.map((e,i)=>i===tidx?{...e,hp:finalHp}:e);
      setEncounter(prev=>({...prev,enemies:upd}));
      if(stunned){gLog(enemy.name+" stunned - skips turn!","combat");setStunned(false);setCombatTurn("player");return;}
      setCombatTurn("enemy");setTimeout(()=>enemyTurnFnRef.current&&enemyTurnFnRef.current({...enemy,hp:finalHp}),900);
    }
  };

  const travelTo=(dest)=>{
    if(gameView==="combat")return;
    if(lockedRegions.includes(dest)){notify(dest+" is LOCKED by GM!","#ff4444");gLog("GM locked "+dest,"warn");return;}
    const req=REGIONS[dest]?.minLevel||1;
    if(me&&me.level<req){notify("Level "+req+" required!","#ff5533");return;}
    setRegion(dest);setGameView("world");setDungeon(null);dungeonRef.current=null;
    gLog("Traveled to "+dest,"story");notify("Arrived: "+dest,"#e8aa44");
    setQuests(prev=>prev.map(q=>{
      if(q.id===3&&!q.done){const vis=[...new Set([...(q.visited||[]),dest])];if(vis.length>=q.goal){setTimeout(()=>{gLog("Quest: Explorer","system");gainGold(q.reward);},0);return{...q,done:true,visited:vis};}return{...q,visited:vis};}return q;
    }));
    setMe(prev=>{if(!prev)return prev;const rv=[...new Set([...(prev.regionsVisited||[]),dest])];const next={...prev,regionsVisited:rv};setTimeout(()=>checkAch(next),50);return next;});
  };

  const explore=()=>{
    if(exploring||gameView==="combat"||resting)return;setExploring(true);gLog("Exploring "+region+"...","story");
    setTimeout(()=>{
      setExploring(false);const reg=REGIONS[region];const w=WEATHER_EFFECTS[weather]||WEATHER_EFFECTS.clear;
      const eff=Math.min(95,spawnRate+w.spawnMod+(isNight?20:0));const roll=rnd(1,100);
      const bossEv=activeEvents.map(id=>WORLD_EVENTS.find(e=>e.id===id)).find(ev=>ev?.boss);
      if(activeEvents.includes("war")&&pvpEnabled&&rnd(1,100)<=40){
        const on=npcPlayers.filter(n=>n.status==="online");if(on.length){const n=on[rnd(0,on.length-1)];const nc=CLASSES[n.cls];const lm=n.level/50+0.5;const e={name:n.name,icon:nc.icon,hp:Math.round(nc.hp*lm),maxHp:Math.round(nc.hp*lm),atk:Math.round(nc.atk*lm),xp:n.level*40,gold:n.level*15,desc:"PvP",pvp:true};setEncounter({enemies:[e]});setGameView("combat");setCombatTurn("player");setSelectedTargetIdx(0);gLog("PvP! "+n.name+" attacks!","system");return;}
      }
      if(bossEv&&rnd(1,100)<=40){const bt=MOB_TEMPLATES[bossEv.boss];setEncounter({enemies:[{...bt,name:bossEv.boss,maxHp:bt.hp}]});setGameView("combat");setCombatTurn("player");setSelectedTargetIdx(0);gLog("EVENT BOSS: "+bossEv.boss,"system");return;}
      if(roll<=eff){
        const mn=reg.mobs[rnd(0,reg.mobs.length-1)];const t=MOB_TEMPLATES[mn]||MOB_TEMPLATES["Goblin"];
        const em=activeEvents.includes("eclipse")?1.5:isNight?1.2:1.0;
        const mob={...t,name:mn,hp:Math.round(t.hp*em),maxHp:Math.round(t.hp*em),atk:Math.round(t.atk*em)};
        let enemies=[mob];
        if(reg.danger>=3&&rnd(1,100)<=30){const m2n=reg.mobs[rnd(0,reg.mobs.length-1)];const t2=MOB_TEMPLATES[m2n]||MOB_TEMPLATES["Goblin"];const m2={...t2,name:m2n,hp:Math.round(t2.hp*em),maxHp:Math.round(t2.hp*em),atk:Math.round(t2.atk*em)};enemies=[mob,m2];gLog("Two enemies: "+mob.name+" + "+m2n,"combat");}
        else gLog(mn+" appears! "+t.desc,"combat");
        setEncounter({enemies});setGameView("combat");setSelectedTargetIdx(0);
      } else if(roll<=eff+20){
        // Random event roll — decide which special event happens
        const evRoll=rnd(1,100);
        if(evRoll<=18){
          // Wandering Merchant
          const pool=[...WANDERER_POOL].sort(()=>Math.random()-0.5).slice(0,4);
          setRandomEvent({type:"wanderer",items:pool});
          gLog("A wandering merchant appears!","gold");notify("🛒 Wandering Merchant!","#ffd700");
        } else if(evRoll<=36){
          // Hidden Shrine
          const buffs=[...SHRINE_BUFFS].sort(()=>Math.random()-0.5).slice(0,3);
          setRandomEvent({type:"shrine",buffs});
          gLog("You find a hidden shrine...","story");notify("🕌 Hidden Shrine!","#aa88ff");
        } else {
          // Treasure chest (original)
          gainGold(rnd(reg.danger*5,reg.danger*25));gLog("Treasure chest!","gold");
          if(rnd(1,3)===1){const k=Object.keys(ITEMS);const it=k[rnd(0,k.length-1)];setMe(p=>p?{...p,inventory:[...p.inventory,it]}:p);gLog("Also found: "+it,"gold");}
          notify("Treasure!","#ffd700");advanceQuest(4);
        }
      } else {
        const fl=["Path is quiet.","Old footprints found.","A bird watches.","Something moved, then vanished.","Distant battle cries.","The wind whispers."];
        gLog(fl[rnd(0,fl.length-1)],"story");
      }
    },900);
  };

  // GM functions
  const gmTriggerEvent=(ev)=>{if(activeEvents.includes(ev.id))return;setActiveEvents(p=>[...p,ev.id]);setEventTimers(p=>({...p,[ev.id]:ev.duration}));gLog("GM: "+ev.name+" - "+ev.desc,"system");notify(ev.icon+" "+ev.name,ev.color);if(ev.id==="festival")setXpMult(3);if(ev.id==="goldrush")setGoldMult(5);if(ev.id==="war")setPvpEnabled(true);if(ev.xpMult&&ev.xpMult>1)setXpMult(ev.xpMult);if(ev.goldMult&&ev.goldMult>1)setGoldMult(ev.goldMult);};
  const gmStopEvent=(id)=>{
    setActiveEvents(p=>{
      const remaining=p.filter(e=>e!==id);
      // Reset multipliers only if no other active event is providing them
      const hasOtherFestival=remaining.some(eid=>eid==="festival"||WORLD_EVENTS.find(e=>e.id===eid)?.xpMult>1);
      const hasOtherGoldrush=remaining.some(eid=>eid==="goldrush"||WORLD_EVENTS.find(e=>e.id===eid)?.goldMult>1);
      if(!hasOtherFestival)setXpMult(1);
      if(!hasOtherGoldrush)setGoldMult(1);
      return remaining;
    });
    setEventTimers(p=>{const n={...p};delete n[id];return n;});

  };

    <div style={{minHeight:"100vh",background:"#050402",color:"#d4b896",fontFamily:"Georgia,serif",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

      {deathScreen&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.97)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",animation:"deathIn 0.5s ease"}}><div style={{textAlign:"center",maxWidth:380}}><div style={{fontSize:80,animation:"floatY 2s infinite",marginBottom:16}}>💀</div><div style={{fontSize:36,color:"#ff3322",letterSpacing:6,fontWeight:"bold",marginBottom:8}}>YOU DIED</div><div style={{fontSize:14,color:"#7a5040",marginBottom:28}}>Slain by <span style={{color:"#ff6644"}}>{deathScreen.killer}</span> in {deathScreen.region}</div><div style={{background:"rgba(255,50,30,0.06)",border:"1px solid #3a1808",borderRadius:8,padding:20,marginBottom:24}}>{[["Level",deathScreen.level],["Kills",deathScreen.kills],["Gold lost","-"+deathScreen.goldLost+"g"]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #2a1208",fontSize:13}}><span style={{color:"#5a4030"}}>{k}</span><span style={{color:k==="Gold lost"?"#ff5533":"#d4b896",fontWeight:"bold"}}>{v}</span></div>)}</div><button onClick={()=>setDeathScreen(null)} style={{background:"rgba(255,50,30,0.1)",border:"1px solid #ff3322",color:"#ff3322",padding:"12px 40px",borderRadius:4,cursor:"pointer",fontSize:15,fontFamily:"Georgia,serif",letterSpacing:3}}>⚔ RESPAWN</button></div></div>}
      {levelUpInfo&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center",maxWidth:360,animation:"lvlUp 0.5s ease"}}><div style={{fontSize:72,animation:"floatY 1.5s infinite",marginBottom:12}}>⬆️</div><div style={{fontSize:11,color:"#e8aa44",letterSpacing:5,marginBottom:4}}>LEVEL UP!</div><div style={{fontSize:44,color:"#e8aa44",fontWeight:"bold",marginBottom:20,textShadow:"0 0 30px #e8aa44"}}>Level {levelUpInfo.newLevel}</div><div style={{background:"rgba(232,170,68,0.06)",border:"1px solid #2a1e0a",borderRadius:8,padding:20,marginBottom:24}}>{[["❤️ Max HP","+"+levelUpInfo.hpGain],["⚔️ ATK","+"+levelUpInfo.atkGain],["✨ MAG","+"+levelUpInfo.magGain],["💧 Mana","+"+levelUpInfo.manaGain],["🌟 SP","+1"]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #1a1208",fontSize:13}}><span style={{color:"#7a6050"}}>{k}</span><span style={{color:"#ffd700",fontWeight:"bold"}}>{v}</span></div>)}</div><button onClick={()=>setLevelUpInfo(null)} style={{background:"rgba(232,170,68,0.12)",border:"1px solid #e8aa44",color:"#e8aa44",padding:"12px 40px",borderRadius:4,cursor:"pointer",fontSize:15,fontFamily:"Georgia,serif",letterSpacing:3}}>CONTINUE</button></div></div>}

            <Btn onClick={()=>setRandomEvent(null)} style={{width:"100%",background:"rgba(90,64,48,0.2)",border:"1px solid #5a4030",color:"#7a6050",padding:"8px",borderRadius:4,fontSize:11}}>Move on</Btn>

                    </div>
                    {gmBountyForm.rewardType==="gold"&&<div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Gold Amount</div><input type="number" value={gmBountyForm.rewardGold} onChange={e=>setGmBountyForm(p=>({...p,rewardGold:+e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>}
                    {gmBountyForm.rewardType==="item"&&<div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Item</div><select value={gmBountyForm.rewardItem} onChange={e=>setGmBountyForm(p=>({...p,rewardItem:e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}>{Object.keys(ITEMS).map(i=><option key={i}>{i}</option>)}</select></div>}
                    <Btn onClick={gmCreateBounty} style={{background:"rgba(255,215,0,0.08)",border:"1px solid #ffd700",color:"#ffd700",padding:"8px",borderRadius:3,fontSize:10,fontFamily:"monospace"}}>📋 CREATE BOUNTY</Btn>
                  </div>
                  {gmBounties.length>0&&(
                    <div>
                      <div style={{fontSize:9,color:"#3a5068",letterSpacing:2,marginBottom:8}}>ACTIVE BOUNTIES</div>
                      {gmBounties.map(b=><div key={b.id} style={{background:"rgba(0,0,0,0.3)",border:"1px solid "+(b.done?"#ffd700":"#1a2535"),borderRadius:3,padding:"7px 10px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:11,color:b.done?"#ffd700":"#b8cfe0"}}>{b.done?"✅ ":""}{b.name}</div><div style={{fontSize:9,color:"#3a5068"}}>{b.progress||0}/{b.goal}</div></div><Btn onClick={()=>setGmBounties(prev=>prev.filter(x=>x.id!==b.id))} style={{background:"none",border:"1px solid #ff4444",color:"#ff4444",padding:"2px 6px",borderRadius:2,fontSize:9}}>✕</Btn></div>)}
                    </div>
                  )}
                  <div style={{marginTop:14}}>
                    <div style={{fontSize:9,color:"#3a5068",letterSpacing:2,marginBottom:8}}>SHOP MODS</div>
                    <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Item</div><select value={gmShopForm.item} onChange={e=>setGmShopForm(p=>({...p,item:e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}>{Object.keys(ITEMS).map(i=><option key={i}>{i}</option>)}</select></div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Shop</div><select value={gmShopForm.shop} onChange={e=>setGmShopForm(p=>({...p,shop:e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}><option value="all">All Shops</option>{Object.keys(REGIONS).map(r=><option key={r}>{r}</option>)}</select></div>
                        <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Duration</div><select value={gmShopForm.duration} onChange={e=>setGmShopForm(p=>({...p,duration:e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}><option value="permanent">Permanent</option><option value="5min">5 min</option><option value="15min">15 min</option><option value="1hr">1 hour</option></select></div>
                      </div>
                      <Btn onClick={gmAddShopMod} style={{background:"rgba(255,215,0,0.06)",border:"1px solid #2a3010",color:"#ffd700",padding:"7px",borderRadius:3,fontSize:10,fontFamily:"monospace"}}>🛍️ ADD TO SHOP</Btn>
                    </div>
                    {gmShopMods.length>0&&gmShopMods.map(m=><div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"rgba(0,0,0,0.3)",border:"1px solid #1a2535",borderRadius:3,marginBottom:4,fontSize:10}}><span style={{color:"#b8cfe0"}}>{m.item} → {m.shop==="all"?"All":m.shop}</span><Btn onClick={()=>setGmShopMods(prev=>prev.filter(x=>x.id!==m.id))} style={{background:"none",border:"1px solid #3a2020",color:"#ff4444",padding:"1px 5px",borderRadius:2,fontSize:9}}>✕</Btn></div>)}
                  </div>
                </div>
              )}

              {/* CREATE TAB */}
              {gmTab==="create"&&(
                <div>
                  <div style={{fontSize:9,color:"#3a5068",letterSpacing:2,marginBottom:8}}>CREATE CUSTOM ITEM</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Name</div><input value={gmCustomItemForm.name} onChange={e=>setGmCustomItemForm(p=>({...p,name:e.target.value}))} placeholder="Item name" style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Icon (emoji)</div><input value={gmCustomItemForm.icon} onChange={e=>setGmCustomItemForm(p=>({...p,icon:e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Type</div><select value={gmCustomItemForm.type} onChange={e=>setGmCustomItemForm(p=>({...p,type:e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}><option value="weapon">Weapon</option><option value="armor">Armor</option><option value="consumable">Consumable</option></select></div>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Effect</div><select value={gmCustomItemForm.effect} onChange={e=>setGmCustomItemForm(p=>({...p,effect:e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}><option value="atk">+ATK</option><option value="mag">+MAG</option><option value="hp">+HP</option><option value="spd">+SPD</option><option value="heal">Heal</option><option value="mana">Mana</option></select></div>
                    </div>
                    <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Value</div><input type="number" value={gmCustomItemForm.value} onChange={e=>setGmCustomItemForm(p=>({...p,value:+e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                    <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Description</div><input value={gmCustomItemForm.desc} onChange={e=>setGmCustomItemForm(p=>({...p,desc:e.target.value}))} placeholder="Item description" style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                    <Btn onClick={gmCreateCustomItem} style={{background:"rgba(68,170,255,0.08)",border:"1px solid #44aaff",color:"#44aaff",padding:"8px",borderRadius:3,fontSize:10,fontFamily:"monospace"}}>⚔️ CREATE ITEM</Btn>
                    <Btn onClick={()=>{if(!gmCustomItemForm.name)return;setMe(p=>p?{...p,inventory:[...p.inventory,gmCustomItemForm.name]}:p);notify("Given: "+gmCustomItemForm.name,"#44aaff");}} style={{background:"rgba(61,214,140,0.06)",border:"1px solid #1a3525",color:"#3dd68c",padding:"8px",borderRadius:3,fontSize:10,fontFamily:"monospace"}}>Give To Player</Btn>
                  </div>
                  <div style={{fontSize:9,color:"#3a5068",letterSpacing:2,marginBottom:8}}>CREATE CUSTOM EVENT</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Event Name</div><input value={gmCustomEventForm.name} onChange={e=>setGmCustomEventForm(p=>({...p,name:e.target.value}))} placeholder="Event name" style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Icon</div><input value={gmCustomEventForm.icon} onChange={e=>setGmCustomEventForm(p=>({...p,icon:e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                    </div>
                    <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Description</div><input value={gmCustomEventForm.desc} onChange={e=>setGmCustomEventForm(p=>({...p,desc:e.target.value}))} placeholder="Event description" style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Duration (s)</div><input type="number" value={gmCustomEventForm.duration} onChange={e=>setGmCustomEventForm(p=>({...p,duration:+e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>XP Mult</div><input type="number" value={gmCustomEventForm.xpMult} min={1} max={10} onChange={e=>setGmCustomEventForm(p=>({...p,xpMult:+e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                      <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Gold Mult</div><input type="number" value={gmCustomEventForm.goldMult} min={1} max={10} onChange={e=>setGmCustomEventForm(p=>({...p,goldMult:+e.target.value}))} style={{...inp(),width:"100%",boxSizing:"border-box"}}/></div>
                    </div>
                    <div><div style={{fontSize:9,color:"#3a5068",marginBottom:3}}>Color</div><input type="color" value={gmCustomEventForm.color} onChange={e=>setGmCustomEventForm(p=>({...p,color:e.target.value}))} style={{width:"100%",height:30,borderRadius:3,border:"1px solid #1a2535",background:"#0a0c10"}}/></div>
                    <Btn onClick={gmCreateCustomEvent} style={{background:"rgba(61,214,140,0.08)",border:"1px solid #3dd68c",color:"#3dd68c",padding:"8px",borderRadius:3,fontSize:10,fontFamily:"monospace"}}>🌟 CREATE & LAUNCH EVENT</Btn>
                  </div>
                  {Object.keys(gmCustomItems).length>0&&(
                    <div>
                      <div style={{fontSize:9,color:"#3a5068",letterSpacing:2,marginBottom:8}}>CUSTOM ITEMS CREATED</div>
                      {Object.entries(gmCustomItems).map(([name,item])=>(
                        <div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"rgba(0,0,0,0.3)",border:"1px solid #1a2535",borderRadius:3,marginBottom:5}}>
                          <span style={{fontSize:11,color:"#b8cfe0"}}>{item.icon} {name}</span>
                          <Btn onClick={()=>setMe(p=>p?{...p,inventory:[...p.inventory,name]}:p)} style={{background:"rgba(68,170,255,0.06)",border:"1px solid #1a2a40",color:"#44aaff",padding:"3px 8px",borderRadius:2,fontSize:9,fontFamily:"monospace"}}>Give</Btn>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* GM LOG */}
            <div ref={gmLogRef} style={{height:100,overflowY:"auto",borderTop:"1px solid #1a2535",padding:"6px 10px",background:"rgba(0,0,0,0.5)",flexShrink:0}}>
              {gmLogs.map((entry,i)=>{
                const colors={system:"#3dd68c",warn:"#ffaa00",info:"#3a5068"};
                return<div key={i} style={{fontSize:9,color:colors[entry.type]||"#3a5068",padding:"1px 0",lineHeight:1.4,fontFamily:"monospace"}}>{entry.t} {entry.msg}</div>;
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GMGame />);
    document.getElementById('loading').style.display = 'none';
  </script>
</body>
</html>
